<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGN Secure Bridge</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0a0a0a; color: #00ff00; padding: 15px; }
        .container { border: 2px solid #00ff00; padding: 20px; border-radius: 15px; background: #111; }
        .id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .id-btn { background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 10px; cursor: pointer; border-radius: 5px; }
        .selected { background: #00ff00 !important; color: #000 !important; }
        input { width: 85%; padding: 12px; margin: 10px 0; border: 1px solid #00ff00; background: #000; color: #00ff00; }
        .call-btn { width: 100%; padding: 15px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; }
        .hangup-btn { width: 100%; padding: 15px; background: #ff0000; color: #fff; border: none; font-weight: bold; cursor: pointer; display: none; margin-top: 10px; }
        #status { margin-top: 15px; color: cyan; }
    </style>
</head>
<body>

    <div class="container">
        <h2>PGN Secure Bridge</h2>
        <div id="current-id" style="color:yellow; margin-bottom:10px;">ID चुनें</div>

        <div class="id-grid" id="id-selector"></div>

        <input type="text" id="remote-id" placeholder="सामने वाले की ID डालें">
        
        <button class="call-btn" id="call-btn" onclick="startCall()">START CALL</button>
        <button class="hangup-btn" id="hangup-btn" onclick="endCall()">HANG UP (कॉल काटें)</button>
        
        <div id="status">System Ready</div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        let peer = null;
        let currentCall = null;
        let localStream = null;

        // 10 IDs generate करना
        const grid = document.getElementById('id-selector');
        for(let i=1; i<=10; i++) {
            let btn = document.createElement('button');
            btn.className = 'id-btn';
            btn.innerText = `User-${i}`;
            btn.onclick = () => initPeer(`pgn-user-${i}`, btn);
            grid.appendChild(btn);
        }

        function initPeer(id, btn) {
            if(peer) peer.destroy();
            document.querySelectorAll('.id-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('current-id').innerText = "आपकी ID: " + id;
            
            peer = new Peer(id);
            peer.on('call', (call) => {
                if (confirm("Incoming Call... Accept?")) {
                    navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                        localStream = stream;
                        call.answer(stream);
                        setupCallUI(call);
                    });
                }
            });
        }

        function startCall() {
            const rId = document.getElementById('remote-id').value;
            if(!rId || !peer) return alert("ID चुनें और सामने वाले की ID डालें");

            navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                localStream = stream;
                const call = peer.call(rId, stream);
                setupCallUI(call);
            });
        }

        function setupCallUI(call) {
            currentCall = call;
            document.getElementById('call-btn').style.display = "none";
            document.getElementById('hangup-btn').style.display = "block";
            document.getElementById('status').innerText = "Call Connected";

            call.on('stream', (stream) => {
                document.getElementById('remote-audio').srcObject = stream;
            });

            // अगर सामने वाला कॉल काटे
            call.on('close', () => endCall());
        }

        function endCall() {
            if (currentCall) currentCall.close();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            document.getElementById('call-btn').style.display = "block";
            document.getElementById('hangup-btn').style.display = "none";
            document.getElementById('status').innerText = "Call Disconnected";
            document.getElementById('remote-audio').srcObject = null;
        }
    </script>
</body>
</html>

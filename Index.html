<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGN Fixed Bridge</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0a0a0a; color: #00ff00; padding: 20px; }
        .container { border: 2px solid #00ff00; padding: 20px; border-radius: 15px; background: #111; box-shadow: 0 0 15px #00ff00; }
        input { width: 85%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #00ff00; background: #000; color: #00ff00; font-weight: bold; }
        button { width: 95%; padding: 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .call-btn { background: #00ff00; color: #000; }
        .hangup-btn { background: #ff0000; color: white; display: none; }
        #status { margin-top: 20px; color: cyan; font-weight: bold; }
        .id-display { font-size: 1.2em; color: yellow; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h2>PGN Fixed ID System</h2>
        <div class="id-display">आपकी स्थिर ID: <br><span id="my-id">Loading...</span></div>
        
        <hr border="1" color="#333">
        
        <p>सामने वाले की ID टाइप करें:</p>
        <input type="text" id="remote-id" placeholder="Ex: friend-7700">
        
        <button class="call-btn" id="call-btn" onclick="startCall()">START SECURE CALL</button>
        <button class="hangup-btn" id="stop-btn" onclick="location.reload()">DISCONNECT</button>
        
        <div id="status">System Ready</div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        // यहाँ अपनी पसंद की कोई भी Fixed ID लिख दें (सिर्फ एक बार)
        const MY_FIXED_ID = 'prince-mandal-7700'; 
        
        const peer = new Peer(MY_FIXED_ID); 

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                alert("यह ID पहले से कोई और इस्तेमाल कर रहा है। कृपया कोड में ID बदलें।");
            }
        });

        // Incoming Call Logic
        peer.on('call', (call) => {
            if (confirm("Incoming Private Call... Accept?")) {
                navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                    call.answer(stream);
                    handleCall(call);
                });
            }
        });

        function startCall() {
            const remoteId = document.getElementById('remote-id').value.trim();
            if (!remoteId) return alert("सामने वाले की ID डालें");

            navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
                const call = peer.call(remoteId, stream);
                handleCall(call);
            });
        }

        function handleCall(call) {
            document.getElementById('status').innerText = "Connecting P2P...";
            document.getElementById('call-btn').style.display = "none";
            document.getElementById('stop-btn').style.display = "block";
            
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-audio').srcObject = remoteStream;
                document.getElementById('status').innerText = "Call Active (Encrypted)";
            });
        }
    </script>
</body>
</html>

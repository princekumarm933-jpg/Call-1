<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGN Secure Bridge</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0a0a0a; color: #00ff00; padding: 15px; }
        .container { border: 2px solid #00ff00; padding: 20px; border-radius: 15px; background: #111; max-width: 400px; margin: auto; }
        .id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .id-btn { background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 10px; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .selected { background: #00ff00 !important; color: #000 !important; font-weight: bold; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #00ff00; background: #000; color: #00ff00; border-radius: 5px; }
        .call-btn { width: 100%; padding: 15px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .hangup-btn { width: 100%; padding: 15px; background: #ff0000; color: #fff; border: none; font-weight: bold; cursor: pointer; display: none; margin-top: 10px; border-radius: 5px; }
        #status { margin-top: 15px; color: cyan; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>PGN Secure Bridge</h2>
        <div id="current-id" style="color:yellow; margin-bottom:10px;">अपनी ID चुनें</div>

        <div class="id-grid" id="id-selector"></div>

        <input type="text" id="remote-id" placeholder="सामने वाले की ID (e.g. pgn-user-2)">
        
        <button class="call-btn" id="call-btn" onclick="startCall()">START CALL</button>
        <button class="hangup-btn" id="hangup-btn" onclick="endCall()">HANG UP (कॉल काटें)</button>
        
        <div id="status">System Ready</div>
    </div>

    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        let peer = null;
        let currentCall = null;
        let localStream = null;

        const grid = document.getElementById('id-selector');
        for(let i=1; i<=10; i++) {
            let btn = document.createElement('button');
            btn.className = 'id-btn';
            btn.innerText = `User-${i}`;
            btn.onclick = () => initPeer(`pgn-user-${i}`, btn);
            grid.appendChild(btn);
        }

        function initPeer(id, btn) {
            if(peer) peer.destroy();
            
            document.querySelectorAll('.id-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            peer = new Peer(id);

            peer.on('open', (id) => {
                document.getElementById('current-id').innerText = "आपकी ID: " + id;
                document.getElementById('status').innerText = "Online & Ready";
            });

            peer.on('call', (call) => {
                if (confirm("Incoming Call from " + call.peer + "... Accept?")) {
                    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                    .then((stream) => {
                        localStream = stream;
                        call.answer(stream);
                        setupCallUI(call);
                    }).catch(err => {
                        alert("Microphone Access Denied!");
                        console.error(err);
                    });
                }
            });

            peer.on('error', (err) => {
                alert("PeerJS Error: " + err.type);
                document.getElementById('status').innerText = "Error: " + err.type;
            });
        }

        async function startCall() {
            const rId = document.getElementById('remote-id').value;
            if(!rId || !peer) return alert("पहले अपनी ID चुनें और फिर सामने वाले की ID डालें");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const call = peer.call(rId, localStream);
                setupCallUI(call);
            } catch (err) {
                alert("Microphone Error: " + err.message);
            }
        }

        function setupCallUI(call) {
            currentCall = call;
            document.getElementById('call-btn').style.display = "none";
            document.getElementById('hangup-btn').style.display = "block";
            document.getElementById('status').innerText = "Connecting...";

            call.on('stream', (stream) => {
                document.getElementById('status').innerText = "Call Connected";
                const audio = document.getElementById('remote-audio');
                audio.srcObject = stream;
                audio.play();
            });

            call.on('close', () => endCall());
            call.on('error', () => endCall());
        }

        function endCall() {
            if (currentCall) currentCall.close();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            document.getElementById('call-btn').style.display = "block";
            document.getElementById('hangup-btn').style.display = "none";
            document.getElementById('status').innerText = "Call Disconnected";
            document.getElementById('remote-audio').srcObject = null;
        }
    </script>
</body>
</html>
